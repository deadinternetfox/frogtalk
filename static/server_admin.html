<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrogTalk Server Manager</title>
<style>
:root {
  --bg: #08110b;
  --bg-soft: #0f1d13;
  --surface: #13261a;
  --surface-2: #1b3324;
  --text: #e8f2eb;
  --muted: #93ab9a;
  --accent: #56d16d;
  --warn: #ffb347;
  --danger: #ff6a6a;
  --line: #284635;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
  background: radial-gradient(circle at 0% 0%, #12311f 0%, var(--bg) 45%), linear-gradient(145deg, #061008 0%, #09140c 100%);
  color: var(--text);
}
.wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 36px; }
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
}
.title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 0.2px;
}
.sub { color: var(--muted); font-size: 13px; }
.btn {
  border: 1px solid var(--line);
  background: var(--surface-2);
  color: var(--text);
  border-radius: 10px;
  padding: 9px 12px;
  cursor: pointer;
  font-weight: 600;
}
.btn:hover { border-color: var(--accent); }
.btn.primary { background: linear-gradient(135deg, #3ab55a 0%, #2f9148 100%); color: #041108; border-color: #4cc266; }
.btn.danger { background: #3a1e20; border-color: #69363a; color: #ffbdbd; }
.panel {
  background: rgba(19, 38, 26, 0.92);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
  backdrop-filter: blur(4px);
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.card {
  background: #102317;
  border: 1px solid #264433;
  border-radius: 12px;
  padding: 12px;
}
.card-label { color: var(--muted); font-size: 12px; }
.card-value { font-size: 24px; font-weight: 800; margin-top: 4px; }
.card-meta { margin-top: 6px; color: var(--muted); font-size: 11px; }
.layout {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 12px;
}
.layout-3 {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.section-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.table th, .table td {
  border-bottom: 1px solid #203b2c;
  padding: 8px 6px;
  text-align: left;
}
.table th { color: var(--muted); font-weight: 600; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
input, select {
  width: 100%;
  border: 1px solid var(--line);
  background: #0e1d14;
  color: var(--text);
  border-radius: 10px;
  padding: 9px 10px;
}
.msg {
  margin-top: 8px;
  min-height: 18px;
  font-size: 12px;
  color: var(--muted);
}
.badge {
  display: inline-block;
  border-radius: 999px;
  border: 1px solid #355843;
  padding: 3px 7px;
  font-size: 11px;
  color: #c8edd1;
}
.hidden { display: none !important; }
#login-screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 16px;
}
.login-box {
  width: 100%;
  max-width: 420px;
  background: rgba(17, 34, 23, 0.95);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px;
}
.login-box h1 { margin: 0 0 6px; font-size: 24px; }
.login-box p { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
@media (max-width: 980px) {
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .layout { grid-template-columns: 1fr; }
  .layout-3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h1>Server Manager</h1>
      <p>Secure operator console for this FrogTalk node.</p>
      <div class="form-row">
        <input id="login-user" placeholder="Username" autocomplete="username">
        <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
      </div>
      <button class="btn primary" id="login-btn" style="width:100%">Log In</button>
      <div class="msg" id="login-msg"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="wrap">
      <div class="header">
        <div>
          <div class="title">FrogTalk Node Control</div>
          <div class="sub">Live server telemetry, moderation tools, and federation operations</div>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <span id="latency-badge" class="badge">Latency: -- ms</span>
          <button class="btn" id="refresh-btn">Refresh</button>
          <button class="btn danger" id="logout-btn">Log Out</button>
        </div>
      </div>

      <div class="panel">
        <div class="grid" id="stats-grid"></div>
      </div>

      <div class="panel" style="margin-top:12px;">
        <div class="section-title">Hardware Resources</div>
        <div class="grid" id="resource-grid"></div>
      </div>

      <div class="layout">
        <div class="panel">
          <div class="section-title">Online Users</div>
          <table class="table">
            <thead>
              <tr>
                <th>User</th>
                <th>Connections</th>
                <th>Role</th>
              </tr>
            </thead>
            <tbody id="online-users-body"></tbody>
          </table>
        </div>

        <div class="panel">
          <div class="section-title">Server Controls</div>

          <div style="margin-bottom:10px;">
            <button class="btn" id="sync-dir-btn" style="width:100%">Sync Official Directory</button>
          </div>

          <div class="form-row">
            <input id="mod-nick" placeholder="Target nickname">
            <input id="mod-duration" type="number" min="1" value="60" placeholder="Duration (mins)">
          </div>
          <input id="mod-reason" placeholder="Reason (optional)" style="margin-bottom:8px;">

          <div class="form-row">
            <button class="btn" data-action="kick">Kick</button>
            <button class="btn danger" data-action="ban">Ban</button>
          </div>
          <div class="form-row">
            <button class="btn" data-action="mute">Mute</button>
            <button class="btn" data-action="unmute">Unmute</button>
          </div>
          <button class="btn" data-action="unban" style="width:100%">Unban</button>

          <div id="action-msg" class="msg"></div>
        </div>
      </div>

      <div class="layout-3">
        <div class="panel">
          <div class="section-title">Federation Nodes</div>
          <table class="table">
            <thead>
              <tr>
                <th>Node</th>
                <th>Status</th>
                <th>Trust</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="nodes-body"></tbody>
          </table>
        </div>
        <div class="panel">
          <div class="section-title">Node Action Output</div>
          <div id="node-msg" class="msg" style="min-height:220px; white-space:pre-wrap;"></div>
        </div>
      </div>
    </div>
  </div>

<script src="/static/js/server_admin.js"></script>
</body>
</html>
