# Default FrogTalk app — listens on 80 (direct) and 8080 (Cloudflare tunnel)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 8080;
    listen [::]:8080;
    server_name _;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection '1; mode=block' always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # HSTS — long-lived once we know HTTPS is healthy. Cloudflare terminates
    # TLS so the upstream connection is HTTP; that's fine, HSTS is a
    # *response* header consumed by browsers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Lock down browser feature APIs — FrogTalk uses mic/camera only via
    # the calls flow which runs same-origin, so we keep self there but
    # deny everything else.
    add_header Permissions-Policy "microphone=(self), camera=(self), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
    # Content Security Policy. The frontend uses a lot of inline event
    # handlers (onclick="...") and inline <style> for theme overrides, so
    # we keep 'unsafe-inline' for script and style. img/media/font allow
    # data: and https: because users embed remote avatars, gif previews,
    # link unfurl thumbnails, etc. connect-src is 'self' + wss for the
    # main WS, plus https: for the link-preview / federation fetches the
    # frontend triggers indirectly. frame-ancestors 'none' blocks
    # clickjacking even where X-Frame-Options is ignored.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https: http:; media-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' wss: https:; frame-src 'self' https://www.youtube.com https://open.spotify.com https://platform.twitter.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

    client_max_body_size 50M;

    # gzip on text responses (HTML/JS/CSS/JSON) — small CPU cost, big bandwidth win
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_vary on;

    # Serve static assets directly from disk — long-lived cache because
    # the app shell appends ?v=<mtime> to every reference, so changes bust
    # the cache automatically. Bypasses the FastAPI app entirely for speed.
    location ^~ /static/ {
        alias /opt/frogtalk/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        open_file_cache max=2000 inactive=60s;
        open_file_cache_valid 60s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
        try_files $uri =404;
    }

    location ^~ /board_uploads/ {
        alias /opt/frogtalk/board/board_uploads/;
        expires 7d;
        add_header Cache-Control public;
        add_header X-Content-Type-Options nosniff always;
        # Hard-refuse anything that could be interpreted as PHP / CGI /
        # config — even if MIME validation in the uploader is bypassed,
        # the file can't be executed by php-fpm.
        location ~* \.(php|phtml|phar|phps|pl|py|cgi|sh|htaccess|htpasswd)$ { deny all; }
        # SVG can carry inline <script>; force download instead of inline
        # render so it can't XSS site-origin.
        location ~* \.svg$ { add_header Content-Disposition "attachment" always; add_header X-Content-Type-Options nosniff always; }
    }
    location ^~ /board_previews/ {
        alias /opt/frogtalk/board/board_previews/;
        expires 7d;
        add_header Cache-Control public;
        add_header X-Content-Type-Options nosniff always;
        location ~* \.(php|phtml|phar|phps|pl|py|cgi|sh|htaccess|htpasswd)$ { deny all; }
        location ~* \.svg$ { add_header Content-Disposition "attachment" always; add_header X-Content-Type-Options nosniff always; }
    }

    # Standalone PHP scripts under /board (preview generator, likes, scan worker)
    # MUST be matched BEFORE the catch-all /board(/.*)?$ block below.
    location ~ ^/(board_preview|board_likes|board_chat|board_admin|board_scan_worker)\.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/frogtalk/board/$1.php;
        fastcgi_param DOCUMENT_ROOT /opt/frogtalk/board;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param SERVER_NAME $server_name;
        # Tell PHP we are behind https so it generates https URLs
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_read_timeout 30;
    }

    location ~ ^/board(/.*)?$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/frogtalk/board/router.php;
        fastcgi_param DOCUMENT_ROOT /opt/frogtalk/board;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param SERVER_NAME $server_name;
        # Tell PHP we are behind https so OG/canonical URLs use https://
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_read_timeout 60;
    }


    # LOW-G3: nginx upstream port matches uvicorn's PORT env (8080).
    # The historical 127.0.0.1:8000 default left the listen socket
    # bound on 8000 but nginx pointed at the wrong port unless an
    # operator manually edited their env, which a couple of nodes
    # missed for a release cycle. Upstream block keeps it in one place.
    upstream frogtalk_app {
        server 127.0.0.1:8080 fail_timeout=0;
    }

    # Sitemaps — no gzip, no caching, explicit charset so Googlebot always reads fresh XML
    location ~ ^/sitemap.*\.xml$ {
        gzip off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        proxy_pass http://frogtalk_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Production runs behind Cloudflare which terminates TLS, so the
        # nginx-side scheme is always http but the original client request
        # was https. Hardcode https here to match what the app's
        # secure-cookie / HSTS gating expects.
        proxy_set_header X-Forwarded-Proto https;
    }
    location / {
        proxy_pass http://frogtalk_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 86400;
    }
}

# Redirect goyim.co.nz to frogtalk.xyz/board/ (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name goyim.co.nz www.goyim.co.nz;

    return 301 https://frogtalk.xyz/board/;
}

# Redirect goyim.co.nz to frogtalk.xyz/board/ (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name goyim.co.nz www.goyim.co.nz;

    ssl_certificate /etc/ssl/certs/goyim.co.nz.crt;
    ssl_certificate_key /etc/ssl/private/goyim.co.nz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    return 301 https://frogtalk.xyz/board/;
}
